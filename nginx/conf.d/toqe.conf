# Config para o nginx do HOST (não container).
# Copiar para: /etc/nginx/sites-available/toqe
# Ativar com: ln -s /etc/nginx/sites-available/toqe /etc/nginx/sites-enabled/toqe
# Testar com: nginx -t && systemctl reload nginx
#
# SSL: Cloudflare Origin Certificate (wildcard *.toqe-barber.com.br)
# Arquivos: /etc/ssl/cloudflare/toqe-barber.pem e toqe-barber.key
# Modo Cloudflare: Full (strict)

# ── Rate limiting — protege mesmo se Cloudflare for bypassado ─────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=app_limit:10m  rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── api.toqe-barber.com.br → NestJS ──────────────────────────────────────────

server {
    server_name api.toqe-barber.com.br;

    client_max_body_size 5m;

    location /api/v1/ {
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
}

server {
    listen 80;
    server_name api.toqe-barber.com.br;
    return 301 https://$host$request_uri;
}

# ── app.toqe-barber.com.br → Next.js ─────────────────────────────────────────

server {
    server_name app.toqe-barber.com.br;

    # Security headers para o frontend (Helmet cobre o NestJS; aqui cobre o Next.js)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        limit_req  zone=app_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
}

server {
    listen 80;
    server_name app.toqe-barber.com.br;
    return 301 https://$host$request_uri;
}

# ── toqe-barber.com.br → redirect para app ───────────────────────────────────

server {
    server_name toqe-barber.com.br;

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;

    return 301 https://app.toqe-barber.com.br$request_uri;
}

server {
    listen 80;
    server_name toqe-barber.com.br;
    return 301 https://app.toqe-barber.com.br$request_uri;
}
