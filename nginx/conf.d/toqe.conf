# Config para o nginx do HOST (não container).
# Copiar para: /etc/nginx/sites-available/toqe
# Ativar com: ln -s /etc/nginx/sites-available/toqe /etc/nginx/sites-enabled/toqe
# Testar com: nginx -t && systemctl reload nginx
#
# SSL: Cloudflare Origin Certificate (wildcard *.toqe-barber.com.br)
# Arquivos: /etc/ssl/cloudflare/toqe-barber.pem e toqe-barber.key
# Modo Cloudflare: Full (strict)

# ── IP real do cliente (Cloudflare → nginx) ───────────────────────────────────
# Sem isso, $remote_addr seria o IP do edge do Cloudflare e todos os usuários
# compartilhariam o mesmo bucket de rate limit.
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ── Rate limiting — protege mesmo se Cloudflare for bypassado ─────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=app_limit:10m  rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── CORS para origens permitidas (aplicado também em respostas de erro) ────────
# O NestJS já adiciona CORS em respostas 2xx/4xx normais; este map garante que
# respostas de erro do próprio nginx (504, 502, etc.) também carreguem o header,
# evitando que o browser reporte "CORS error" em vez do erro real.
map $http_origin $cors_origin {
    default                              "";
    "https://app.toqe-barber.com.br"    "https://app.toqe-barber.com.br";
    "https://toqe-barber.com.br"        "https://toqe-barber.com.br";
}


# ── api.toqe-barber.com.br → NestJS ──────────────────────────────────────────

server {
    server_name api.toqe-barber.com.br;

    client_max_body_size 5m;

    location /api/v1/ {
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        # Preflight OPTIONS — responde direto no nginx sem bater na API
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, x-tenant-id, x-barbearia-codigo' always;
            add_header 'Access-Control-Max-Age'           '86400'      always;
            return 204;
        }


        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Remove os headers CORS do upstream (NestJS já os seta) para evitar duplicação.
        # O nginx então re-adiciona com `add_header`, garantindo CORS também em erros
        # gerados pelo próprio nginx (502, 504, etc.) onde o NestJS não chega a responder.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
    }

    location /docs {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
}

server {
    listen 80;
    server_name api.toqe-barber.com.br;
    return 301 https://$host$request_uri;
}

# ── app.toqe-barber.com.br → Next.js ─────────────────────────────────────────

server {
    server_name app.toqe-barber.com.br;

    # Security headers para o frontend (Helmet cobre o NestJS; aqui cobre o Next.js)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    location / {
        limit_req  zone=app_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
}

server {
    listen 80;
    server_name app.toqe-barber.com.br;
    return 301 https://$host$request_uri;
}

# ── toqe-barber.com.br → redirect para app ───────────────────────────────────

server {
    server_name toqe-barber.com.br;

    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/toqe-barber.pem;
    ssl_certificate_key /etc/ssl/cloudflare/toqe-barber.key;

    return 301 https://app.toqe-barber.com.br$request_uri;
}

server {
    listen 80;
    server_name toqe-barber.com.br;
    return 301 https://app.toqe-barber.com.br$request_uri;
}
