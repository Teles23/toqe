# Config para o nginx do HOST (não container).
# Copiar para: /etc/nginx/sites-available/toqe
# Ativar com: ln -s /etc/nginx/sites-available/toqe /etc/nginx/sites-enabled/toqe
# Testar com: nginx -t && systemctl reload nginx
#
# Por enquanto usa IP direto. Quando tiver domínio:
#   - trocar server_name pelo domínio
#   - rodar certbot --nginx -d seudominio.com

server {
    listen 80;
    server_name toqe.duckdns.org;

    # API REST + Swagger
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket — Socket.IO
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Frontend Next.js — tudo o mais
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
