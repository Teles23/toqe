version: "3.9"

# Compose de desenvolvimento — bind mount do source, hot reload, sem nginx
# Uso: docker compose -f docker-compose.dev.yml up --build
#
# O source da API e dos packages reflete automaticamente no container.
# node_modules ficam isolados no container (volume anônimo).

services:
  api:
    container_name: toqe-api-dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: >
      sh -c "
        cd /app/apps/api &&
        pnpm prisma migrate deploy --config ./prisma.config.ts &&
        pnpm prisma generate --schema=./prisma/schema.prisma &&
        node prisma/seed-runner.js &&
        pnpm run start:dev
      "
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://toqe_app:senha_forte@postgres:5432/toqe}
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_refresh_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-senha_forte}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # Aceita tanto o host quanto o container web como origem CORS
      - CORS_ORIGINS=http://localhost:3001,http://127.0.0.1:3001,http://${LAN_HOST_IP:-localhost}:3001,http://toqe-web-dev:3001
    volumes:
      # Packages compartilhados — tipos, validators, config
      #- ./packages:/app/packages
      # Isola node_modules do container (não usa o da máquina host).
      # IMPORTANTE: o `pnpm install` no workspace toca o node_modules de TODOS os
      # packages. Sem volume, ele reescreveria o node_modules do host (Windows)
      # com symlinks/binários Linux e quebraria o tooling Windows (e vice-versa).
      # Por isso isolamos cada package usado pelo container OU pelo tooling.
      - .:/app
      - api_dev_node_modules:/app/node_modules
      - api_dev_app_node_modules:/app/apps/api/node_modules
      - api_dev_contracts_node_modules:/app/packages/contracts/node_modules
      - api_dev_mobile_node_modules:/app/apps/mobile/node_modules
      - api_dev_shared_node_modules:/app/packages/shared/node_modules
      - api_dev_config_node_modules:/app/packages/config/node_modules
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    container_name: toqe-web-dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    command: >
      sh -c "cd /app/apps/web && pnpm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # URL acessível pelo BROWSER (via porta mapeada no host)
      - NEXT_PUBLIC_API_URL=http://${LAN_HOST_IP:-localhost}:3000/api/v1
      # URL interna Docker — usada pelos BFF route handlers (server-side)
      - INTERNAL_API_URL=http://toqe-api-dev:3000/api/v1
    volumes:
      - .:/app
      - web_dev_node_modules:/app/node_modules
      - web_dev_app_node_modules:/app/apps/web/node_modules
      # Isola a cache de build do Next.js
      - web_dev_next_cache:/app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    container_name: toqe-nginx-dev
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d/dev-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  postgres:
    container_name: toqe-postgres-dev
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: toqe
      POSTGRES_USER: ${POSTGRES_USER:-toqe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toqe_app} -d toqe"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: toqe-redis-dev
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-senha_forte}
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
  api_dev_node_modules:
  api_dev_app_node_modules:
  api_dev_contracts_node_modules:
  api_dev_mobile_node_modules:
  api_dev_shared_node_modules:
  api_dev_config_node_modules:
  web_dev_node_modules:
  web_dev_app_node_modules:
  web_dev_next_cache:
