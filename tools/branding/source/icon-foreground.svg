<?xml version="1.0" encoding="UTF-8"?>
<!--
  Toqe — adaptive icon foreground (Android)
  Transparente; "T" + acento centralizado com safe-area de ~33% nas bordas.

  Android pode escalar/cortar até 1/3 das bordas para gerar formas variadas
  (círculo, squircle, etc.) — todo conteúdo importante DEVE caber no centro
  de 432px do canvas total de 432px (safe zone: 144-288).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <g fill="#ffffff">
    <!-- Escala equivalente proporcional ao icon.svg principal,
         mas compactada para a safe zone Android (288px ao invés de 1024px).
         Barra horizontal: w=228, h=60, r=10, centro=(216, 159)  → x=102, y=129 -->
    <rect x="102" y="129" width="228" height="60" rx="10" ry="10"/>
    <!-- Tronco vertical: w=60, h=228, r=10, x=186, y=129 -->
    <rect x="186" y="129" width="60" height="228" rx="10" ry="10"/>
    <!-- Acento circular -->
    <circle cx="295" cy="325" r="27"/>
  </g>
</svg>
