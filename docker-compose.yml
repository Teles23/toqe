version: '3.9'

services:
  nginx:
    container_name: toqe-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    restart: unless-stopped

  api:
    container_name: toqe-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://toqe_app:senha_forte@postgres:5432/toqe}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh}
      - REDIS_URL=${REDIS_URL:-redis://:senha_forte@redis:6379}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

#  web:
#    container_name: toqe-web
#    build:
#      context: .
#      dockerfile: apps/web/Dockerfile
#    environment:
#      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-secret}
#      - API_URL=http://api:3000
#    restart: unless-stopped

  postgres:
    container_name: toqe-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: toqe
      POSTGRES_USER: ${POSTGRES_USER:-toqe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    container_name: toqe-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-senha_forte}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
