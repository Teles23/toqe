version: '3.9'

services:
  nginx:
    container_name: toqe-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    restart: unless-stopped

  api:
    container_name: toqe-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://toqe_app:senha_forte@postgres:5432/toqe}
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_me_in_production}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-senha_forte}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

#  web:
#    container_name: toqe-web
#    build:
#      context: .
#      dockerfile: apps/web/Dockerfile
#    environment:
#      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-secret}
#      - API_URL=http://api:3000
#    restart: unless-stopped

  postgres:
    container_name: toqe-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: toqe
      POSTGRES_USER: ${POSTGRES_USER:-toqe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toqe_app} -d toqe"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: toqe-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-senha_forte}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
