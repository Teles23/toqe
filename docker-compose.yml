version: "3.9"

services:
  nginx:
    container_name: toqe-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    restart: unless-stopped

  api:
    container_name: toqe-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  #  web:
  #    container_name: toqe-web
  #    build:
  #      context: .
  #      dockerfile: apps/web/Dockerfile
  #    environment:
  #      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-secret}
  #      - API_URL=http://api:3000
  #    restart: unless-stopped

  postgres:
    container_name: toqe-postgres
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: toqe
      POSTGRES_USER: ${POSTGRES_USER:-toqe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toqe_app} -d toqe"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: toqe-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
