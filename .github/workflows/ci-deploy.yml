name: CI Deploy

# main  → docker (tags: main, latest, sha) + deploy produção
# tags v* → docker (tags: semver, sha)  [não faz deploy — só main faz]

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    name: Docker build & push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Generate image tags
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          APP: ${{ matrix.app }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/toqe-${APP}"
          SHORT_SHA="${GIT_SHA:0:7}"

          TAGS="--tag ${IMAGE}:sha-${SHORT_SHA}"

          if [[ "${GIT_REF}" == "refs/heads/main" ]]; then
            TAGS="${TAGS} --tag ${IMAGE}:main --tag ${IMAGE}:latest"
          elif [[ "${GIT_REF}" == refs/tags/* ]]; then
            TAGS="${TAGS} --tag ${IMAGE}:${GIT_REF_NAME}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Setup buildx builder
        run: docker buildx create --use --driver docker-container --name ci-builder

      - name: Build & push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          APP: ${{ matrix.app }}
        run: |
          # shellcheck disable=SC2086
          docker buildx build \
            $TAGS \
            --file "apps/${APP}/Dockerfile" \
            --push \
            --cache-from "type=gha,scope=${APP}" \
            --cache-to "type=gha,mode=min,scope=${APP}" \
            --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            --build-arg "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}" \
            .

  deploy-production:
    name: Deploy → VPS (production)
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar GOOGLE_CLIENT_ID na .env da VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: GOOGLE_CLIENT_ID
          script_stop: true
          script: |
            set -e
            cd /opt/projetos/toqe
            touch .env
            grep -v '^GOOGLE_CLIENT_ID=' .env > .env.tmp || true
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar CORS_ORIGINS na .env da VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: CORS_ORIGINS
          script_stop: true
          script: |
            set -e
            # Falha explícita se o secret não estiver configurado — não escrever
            # CORS_ORIGINS= vazio (criaria array [''] truthy que silencia CORS).
            [ -n "$CORS_ORIGINS" ] || { echo "ERRO: secret CORS_ORIGINS não configurado"; exit 1; }
            cd /opt/projetos/toqe
            touch .env
            grep -v '^CORS_ORIGINS=' .env > .env.tmp || true
            printf 'CORS_ORIGINS=%s\n' "$CORS_ORIGINS" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar RESEND_API_KEY na .env da VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: RESEND_API_KEY
          script_stop: true
          script: |
            set -e
            [ -n "$RESEND_API_KEY" ] || { echo "ERRO: secret RESEND_API_KEY não configurado — emails não serão enviados"; exit 1; }
            cd /opt/projetos/toqe
            touch .env
            grep -v '^RESEND_API_KEY=' .env > .env.tmp || true
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar API_BASE_URL na .env da VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: API_BASE_URL
          script_stop: true
          script: |
            set -e
            [ -n "$API_BASE_URL" ] || { echo "ERRO: secret API_BASE_URL não configurado — logos ficarão inacessíveis"; exit 1; }
            cd /opt/projetos/toqe
            touch .env
            grep -v '^API_BASE_URL=' .env > .env.tmp || true
            printf 'API_BASE_URL=%s\n' "$API_BASE_URL" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar FRONTEND_URL na .env da VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: FRONTEND_URL
          script_stop: true
          script: |
            set -e
            [ -n "$FRONTEND_URL" ] || { echo "ERRO: secret FRONTEND_URL não configurado — links em e-mails apontarão para localhost"; exit 1; }
            cd /opt/projetos/toqe
            touch .env
            grep -v '^FRONTEND_URL=' .env > .env.tmp || true
            printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar EMAIL_FROM na .env da VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: EMAIL_FROM
          script_stop: true
          script: |
            set -e
            cd /opt/projetos/toqe
            touch .env
            grep -v '^EMAIL_FROM=' .env > .env.tmp || true
            # EMAIL_FROM tem fallback (onboarding@resend.dev), então não falha se vazio
            [ -n "$EMAIL_FROM" ] && printf 'EMAIL_FROM=%s\n' "$EMAIL_FROM" >> .env.tmp || true
            mv .env.tmp .env

      - name: Sincronizar docker-compose.prod.yml para a VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          source: "docker-compose.prod.yml,nginx/conf.d/toqe.conf"
          target: /opt/projetos/toqe

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /opt/projetos/toqe

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" --password-stdin

            echo "Pulling images (até 3 tentativas)..."
            for attempt in 1 2 3; do
              docker compose -f docker-compose.prod.yml pull && break
              if [ "$attempt" -eq 3 ]; then
                echo "✗ Pull falhou após 3 tentativas"
                exit 1
              fi
              echo "Tentativa $attempt falhou — aguardando $((attempt * 15))s antes de tentar novamente..."
              sleep $((attempt * 15))
            done

            docker compose -f docker-compose.prod.yml up -d postgres redis
            echo "Aguardando Postgres ficar healthy..."
            sleep 15

            docker compose -f docker-compose.prod.yml up -d api || {
              echo "=== API falhou ao subir — logs abaixo ==="
              docker compose -f docker-compose.prod.yml logs api --tail=150
              exit 1
            }

            echo "Aguardando API inicializar (migrações + boot)..."
            API_HEALTHY=0
            for i in $(seq 1 12); do
              sleep 15
              echo "Tentativa $i/12..."
              docker compose -f docker-compose.prod.yml ps api
              if wget -qO- http://127.0.0.1:4000/health/ready; then
                echo "✓ API healthy"
                API_HEALTHY=1
                break
              fi
            done
            if [ "$API_HEALTHY" -eq 0 ]; then
              echo "✗ API não respondeu após 180s — logs abaixo:"
              docker compose -f docker-compose.prod.yml logs api --tail=200
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sudo cp nginx/conf.d/toqe.conf /etc/nginx/sites-available/toqe
            sudo nginx -t && sudo systemctl reload nginx

            docker image prune -f
