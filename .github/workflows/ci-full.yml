name: CI Full

# develop → integration + security (validação; sem build/deploy)
# main    → docker (tags: main, latest, sha) + deploy produção
# tags v* → docker (tags: semver, sha)  [não faz deploy — só main faz]

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Roda apenas em develop — valida antes de promover para main
  integration-security:
    name: Integration & Security tests
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TELEMETRY_DISABLED: 1
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Test — Integration
        run: pnpm --filter api test:integration
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          TESTCONTAINERS_RYUK_DISABLED: true
          JWT_SECRET: ci-integration-test-secret

      - name: Test — Security
        run: pnpm --filter api test:security
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          TESTCONTAINERS_RYUK_DISABLED: true
          JWT_SECRET: ci-integration-test-secret

      - name: Validate seed
        run: |
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  # Roda apenas em main e tags — develop não tem ambiente de destino para a imagem
  docker:
    name: Docker build & push — ${{ matrix.app }}
    needs: [integration-security]
    if: |
      always() &&
      (needs.integration-security.result == 'success' || needs.integration-security.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/toqe-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=min,scope=${{ matrix.app }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

  # Deploy para produção somente após merge em main
  deploy-production:
    name: Deploy → VPS (production)
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar GOOGLE_CLIENT_ID na .env da VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: GOOGLE_CLIENT_ID
          script_stop: true
          script: |
            set -ex
            cd /opt/projetos/toqe
            touch .env
            grep -v '^GOOGLE_CLIENT_ID=' .env > .env.tmp || true
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID" >> .env.tmp
            mv .env.tmp .env

      - name: Sincronizar docker-compose.prod.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          source: "docker-compose.prod.yml,nginx/conf.d/toqe.conf"
          target: /opt/projetos/toqe

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /opt/projetos/toqe

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d postgres redis
            echo "Aguardando Postgres ficar healthy..."
            sleep 15

            docker compose -f docker-compose.prod.yml up -d api || {
              echo "=== API falhou ao subir — logs abaixo ==="
              docker compose -f docker-compose.prod.yml logs api --tail=150
              exit 1
            }

            echo "Aguardando API inicializar (migrações + boot)..."
            API_HEALTHY=0
            for i in $(seq 1 12); do
              sleep 15
              echo "Tentativa $i/12..."
              docker compose -f docker-compose.prod.yml ps api
              if wget -qO- http://127.0.0.1:4000/health/ready; then
                echo "✓ API healthy"
                API_HEALTHY=1
                break
              fi
            done
            if [ "$API_HEALTHY" -eq 0 ]; then
              echo "✗ API não respondeu após 180s — logs abaixo:"
              docker compose -f docker-compose.prod.yml logs api --tail=200
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sudo cp nginx/conf.d/toqe.conf /etc/nginx/sites-available/toqe
            sudo nginx -t && sudo systemctl reload nginx

            docker image prune -f

  # Placeholder: E2E web (Playwright) — adicionar quando implementado
  # Placeholder: E2E mobile (Maestro) — adicionar quando implementado
  # Placeholder: Load tests (k6) — adicionar quando implementado
