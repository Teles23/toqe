name: CI Full

# develop → integration + security (validação; sem build/deploy)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-security:
    name: Integration & Security tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TELEMETRY_DISABLED: 1
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Test — Integration
        run: pnpm --filter api test:integration
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          TESTCONTAINERS_RYUK_DISABLED: true
          JWT_SECRET: ci-integration-test-secret

      - name: Test — Security
        run: pnpm --filter api test:security
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          TESTCONTAINERS_RYUK_DISABLED: true
          JWT_SECRET: ci-integration-test-secret

      - name: Validate seed
        run: |
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
