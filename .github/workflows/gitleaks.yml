name: Gitleaks

on:
  push:
    branches:
      - main
      - "feature/**"
      - "arch/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: GITLEAKS_LICENSE for org-level features.
