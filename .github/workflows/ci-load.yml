name: CI Load (k6)

# Execução manual: dispara contra qualquer ambiente via BASE_URL
# Não roda automaticamente em push — load tests não devem bloquear CI normal

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL base da API (ex: https://api.toqe-barber.com.br/api/v1)"
        required: false
        default: "https://api.toqe-barber.com.br/api/v1"
      scenario:
        description: "Cenário a rodar (auth | agendamento | barbearia | all)"
        required: false
        default: "all"
      vus:
        description: "VUs para cenários constant-vus (auth, barbearia). Ignorado em agendamento (ramping-vus)."
        required: false
        default: ""
      duration:
        description: "Duração para cenários constant-vus, ex: 30s, 1m. Ignorado em agendamento."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  load:
    name: Load tests — k6
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Validate and build k6 flags
        id: flags
        env:
          VUS_INPUT: ${{ inputs.vus }}
          DURATION_INPUT: ${{ inputs.duration }}
        run: |
          if [ -n "$VUS_INPUT" ] && ! echo "$VUS_INPUT" | grep -qE '^[0-9]+$'; then
            echo "::error::vus deve ser um inteiro positivo (recebido: $VUS_INPUT)"
            exit 1
          fi
          if [ -n "$DURATION_INPUT" ] && ! echo "$DURATION_INPUT" | grep -qE '^[0-9]+[smhd]$'; then
            echo "::error::duration deve seguir o padrão [0-9]+[smhd], ex: 30s, 2m (recebido: $DURATION_INPUT)"
            exit 1
          fi
          FLAGS=""
          [ -n "$VUS_INPUT" ]      && FLAGS="$FLAGS --vus $VUS_INPUT"
          [ -n "$DURATION_INPUT" ] && FLAGS="$FLAGS --duration $DURATION_INPUT"
          echo "extra=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run auth load test
        if: ${{ inputs.scenario == 'auth' || inputs.scenario == 'all' }}
        run: k6 run ${{ steps.flags.outputs.extra }} tools/load/scenarios/auth-load.js
        env:
          BASE_URL: ${{ inputs.base_url }}

      - name: Run agendamento load test
        if: ${{ inputs.scenario == 'agendamento' || inputs.scenario == 'all' }}
        run: k6 run tools/load/scenarios/agendamento-load.js
        env:
          BASE_URL: ${{ inputs.base_url }}

      - name: Run barbearia load test
        if: ${{ inputs.scenario == 'barbearia' || inputs.scenario == 'all' }}
        run: k6 run ${{ steps.flags.outputs.extra }} tools/load/scenarios/barbearia-load.js
        env:
          BASE_URL: ${{ inputs.base_url }}
