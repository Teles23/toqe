version: 2
updates:
  # Root and workspaces (pnpm)
  - package-ecosystem: npm
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels: [dependencies, npm]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/api
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels: [dependencies, npm, api]
    commit-message:
      prefix: "chore(api,deps)"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/web
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels: [dependencies, npm, web]
    commit-message:
      prefix: "chore(web,deps)"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/mobile
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, npm, mobile]
    commit-message:
      prefix: "chore(mobile,deps)"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Docker base images
  - package-ecosystem: docker
    directory: /apps/api
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, docker, api]
    commit-message:
      prefix: "chore(api,docker)"

  - package-ecosystem: docker
    directory: /apps/web
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, docker, web]
    commit-message:
      prefix: "chore(web,docker)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(ci,deps)"
    groups:
      actions:
        applies-to: version-updates
        update-types: [minor, patch]
