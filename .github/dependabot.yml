version: 2
updates:
  # Workspace inteiro via pnpm-lock.yaml na raiz
  # Entradas por sub-diretório causam erro "workspace:*" porque Dependabot
  # usa npm internamente e npm não entende o protocolo workspace do pnpm.
  - package-ecosystem: npm
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    labels: [dependencies, npm]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Docker base images
  - package-ecosystem: docker
    directory: /apps/api
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, docker, api]
    commit-message:
      prefix: "chore(api,docker)"

  - package-ecosystem: docker
    directory: /apps/web
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, docker, web]
    commit-message:
      prefix: "chore(web,docker)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(ci,deps)"
    groups:
      actions:
        applies-to: version-updates
        update-types: [minor, patch]
