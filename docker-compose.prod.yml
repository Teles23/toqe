# Compose para a VPS de staging (develop).
# Usa imagens pré-buildadas do GHCR — não builda localmente.
# Na VPS: /opt/toqe/docker-compose.prod.yml
# Dependências: /opt/toqe/.env  +  /opt/toqe/nginx/conf.d/toqe.conf
name: toqe-prod

services:
  api:
    image: ghcr.io/teles23/toqe-api:develop
    restart: unless-stopped
    env_file: .env
    ports:
      # Expõe só no loopback — o nginx do host faz o proxy
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    image: ghcr.io/teles23/toqe-web:develop
    restart: unless-stopped
    env_file: .env
    ports:
      # Expõe só no loopback — o nginx do host faz o proxy
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: toqe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d toqe"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
