# Compose de PRODUÇÃO (VPS). Servido pelo deploy automático em push na main.
# Usa imagens pré-buildadas do GHCR (tag :latest, gerada pelo job docker na main).
# Na VPS: /opt/projetos/toqe/docker-compose.prod.yml
# Dependências: /opt/projetos/toqe/.env  +  /opt/projetos/toqe/nginx/conf.d/toqe.conf
name: toqe-prod

services:
  api:
    image: ghcr.io/teles23/toqe-api:latest
    restart: unless-stopped
    env_file: .env
    ports:
      # 4000 no host → 3000 no container (3000 ocupado pelo devportfolio-app)
      - "127.0.0.1:4000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  web:
    image: ghcr.io/teles23/toqe-web:latest
    restart: unless-stopped
    env_file: .env
    ports:
      # 4001 no host → 3001 no container (3001 ocupado pelo eduia-backend)
      - "127.0.0.1:4001:3001"
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_URL: "http://api:3000/api/v1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.8"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: toqe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d toqe"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
