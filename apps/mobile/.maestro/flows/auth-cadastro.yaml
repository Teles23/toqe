appId: com.teles23.toqe
---
- launchApp:
    clearState: true

# Navega para cadastro
- tapOn:
    text: "Cadastre-se"

# Preenche nome
- tapOn:
    accessibilityLabel: "Nome"
- inputText: "Usuário Teste"

# Preenche e-mail (único a cada run — idealmente usar variável Maestro)
- tapOn:
    accessibilityLabel: "E-mail"
- inputText: "novo_usuario@toqe.com"

# Preenche senha
- tapOn:
    accessibilityLabel: "Senha"
- inputText: "senha123"

# Preenche confirmação
- tapOn:
    accessibilityLabel: "Confirmar senha"
- inputText: "senha123"

# Submete
- tapOn:
    accessibilityLabel: "Criar conta"

# Aguarda login automático e redirecionamento
- assertVisible:
    id: "cliente-home"
    optional: true
- assertVisible:
    id: "barbeiro-agenda"
    optional: true
